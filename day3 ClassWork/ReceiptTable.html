<!Doctype html>
<html>
    <head>
        <title>Receipt Table</title>
    </head>
    <body>
        <table border="2" height="500" width="500" cellspacing="5">
            <caption>Receipt Table</caption>
            <tr>
                <th>1</th>
                <th>2</th>
                <th>3</th>
                <th>4</th>
                <th>5</th>
                <th colspan="2">6</th>
                <th>7</th>
            </tr>
            <tr>
                <td colspan="5">Receipt type</td>
                <td colspan="3">Receipt no </td>
            </tr>
            <tr>
                <td colspan="4">Paid By</td>
                <td colspan="4">Paid To</td>
            </tr>
            <tr>
                <td colspan="5">Description</td>
                <td colspan="3">Amount</td>

            </tr>
            <tr >
                <td rowspan="5" colspan="5"></td>
                <td colspan="2">. </td>
                <td> .</td>
            </tr>
            <tr>
                <td colspan="2">Sub Total</td>
                <td></td>
            </tr>
            <tr>
                <td colspan="2">Discount</td>
                <td></td>
            </tr>
            <tr>
                <td colspan="2">Tax</td>
                <td></td>
            </tr>
            <tr>
                <td colspan="2">Total</td>
                <td></td>
            </tr>
            <tr>
                <td colspan="4">Date</td>
                <td colspan="4">Receives By</td>
            </tr>

        </table>
    </body>

</html>
